workflows:

  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
    scripts:
      - name: Install
        script: cd mobile && npm install
      - name: Prebuild
        script: cd mobile && npx expo prebuild --platform android --clean
      - name: Build APK
        script: cd mobile/android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}

  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      android_signing:
        - faahm_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        PACKAGE_NAME: com.faahm.app
        VERSION_CODE: "8"
    scripts:
      - name: Install
        script: cd mobile && npm install

      - name: Set versionCode
        script: |
          cd mobile
          node -e "var fs=require('fs'),d=JSON.parse(fs.readFileSync('app.json'));d.expo.android.versionCode=parseInt('$VERSION_CODE');fs.writeFileSync('app.json',JSON.stringify(d,null,2));console.log('versionCode='+parseInt('$VERSION_CODE'))"

      - name: Prebuild Android
        script: cd mobile && npx expo prebuild --platform android --clean

      - name: Set targetSdkVersion 35 ONLY (keep compileSdk 34)
        script: |
          # IMPORTANT: Only change targetSdkVersion, NOT compileSdkVersion
          # compileSdkVersion 35 breaks Kotlin 1.9.23 used by expo-modules-core
          # targetSdkVersion 35 is what Google Play requires
          printf "\nandroid.targetSdkVersion=35\n" >> mobile/android/gradle.properties
          echo "=== Verification ==="
          grep "targetSdkVersion\|compileSdkVersion" mobile/android/gradle.properties

      - name: Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}
