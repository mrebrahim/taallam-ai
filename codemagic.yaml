workflows:

  # ══════════════════════════════════════════════
  # Android APK (للتجربة والتوزيع المباشر)
  # ══════════════════════════════════════════════
  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        EAS_PROJECT_ID: db7b041c-4ebd-463e-8200-0fba79f76f81

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Prebuild Android
        script: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease 2>&1

    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true

  # ══════════════════════════════════════════════
  # Android AAB — Google Play Store
  # ══════════════════════════════════════════════
  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      android_signing:
        - faahm_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        EAS_PROJECT_ID: db7b041c-4ebd-463e-8200-0fba79f76f81
        PACKAGE_NAME: com.faahm.app

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Prebuild Android
        script: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Set versionCode automatically
        script: |
          cd mobile
          VC=$(( $(git rev-list --count HEAD) + 10 ))
          echo "Setting versionCode to $VC"
          node -e "var fs=require('fs'),d=JSON.parse(fs.readFileSync('app.json'));d.expo.android.versionCode=${VC};fs.writeFileSync('app.json',JSON.stringify(d,null,2));console.log('versionCode =',d.expo.android.versionCode)"

      - name: Force targetSdkVersion 35
        script: |
          find mobile/android -name "*.gradle" -o -name "*.gradle.kts" 2>/dev/null | while read f; do
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' "$f"
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' "$f"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 35/g' "$f"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' "$f"
            echo "Patched: $f"
          done

      - name: Sign and Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true

  # ══════════════════════════════════════════════
  # iOS — App Store
  # ══════════════════════════════════════════════
  ios-production:
    name: "🍎 iOS — App Store"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faahm.app
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY

    scripts:
      - name: Install dependencies
        script: |
          cd mobile && npm install

      - name: Prebuild iOS
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean

      - name: Build iOS IPA
        script: |
          cd mobile/ios
          xcodebuild -workspace Fahim.xcworkspace \
            -scheme Fahim \
            -configuration Release \
            -archivePath Fahim.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath Fahim.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath .

    artifacts:
      - mobile/ios/**/*.ipa

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true
