workflows:

  android-apk:
    name: Android APK Preview
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhc2tjb2dlY2pmd3V4dndsZHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzgzODAsImV4cCI6MjA5MTI1NDM4MH0.ZrtuVXEEFfuEbIkofglo_rEKwZZllZJ1DN2DElpB0ec
        EXPO_TOKEN: NiJTfE-PmV3Ooa1s0j42DvnuzDkHzMFBZDjxJV_3

    scripts:
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Build APK via EAS
        script: |
          cd mobile
          eas build \
            --platform android \
            --profile preview \
            --non-interactive

    artifacts:
      - "**/*.apk"

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true

