workflows:

  android-apk:
    name: Android APK - Local Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      java: 17
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhc2tjb2dlY2pmd3V4dndsZHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzgzODAsImV4cCI6MjA5MTI1NDM4MH0.ZrtuVXEEFfuEbIkofglo_rEKwZZllZJ1DN2DElpB0ec
        EXPO_TOKEN: NiJTfE-PmV3Ooa1s0j42DvnuzDkHzMFBZDjxJV_3
        # GOOGLE_SERVICES_JSON: مضاف من Codemagic Secrets

    scripts:
      - name: Install Expo CLI
        script: npm install -g @expo/cli

      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Setup google-services.json
        script: |
          cd mobile
          # If GOOGLE_SERVICES_JSON secret is set, use it
          # Otherwise use the placeholder (analytics won't work)
          if [ ! -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "✅ google-services.json from secrets"
          else
            echo "⚠️ Using placeholder google-services.json (analytics disabled)"
          fi

      - name: Expo Prebuild
        script: |
          cd mobile
          npx expo prebuild --platform android --clean --no-install

      - name: Build APK with Gradle
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - mobile/android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true
