workflows:

  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
    scripts:
      - name: Install
        script: cd mobile && npm install
      - name: Prebuild
        script: cd mobile && npx expo prebuild --platform android --clean
      - name: Build APK
        script: cd mobile/android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}

  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      android_signing:
        - faahm_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        PACKAGE_NAME: com.faahm.app
        VERSION_CODE: "12"
    scripts:
      - name: Install
        script: cd mobile && npm install

      - name: Set versionCode
        script: |
          cd mobile
          node -e "var fs=require('fs'),d=JSON.parse(fs.readFileSync('app.json'));d.expo.android.versionCode=parseInt('$VERSION_CODE');fs.writeFileSync('app.json',JSON.stringify(d,null,2));console.log('versionCode='+parseInt('$VERSION_CODE'))"

      - name: Prebuild Android
        script: cd mobile && npx expo prebuild --platform android --clean

      - name: Fix app label name to فاهم
        script: |
          # Force app_name in strings.xml to match store listing
          STRINGS_FILE="mobile/android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">فاهم<\/string>/g' "$STRINGS_FILE"
            echo "✅ App name fixed in strings.xml:"
            cat "$STRINGS_FILE"
          else
            echo "❌ strings.xml not found"
            find mobile/android -name "strings.xml" | head -5
          fi

      - name: Set targetSdkVersion 35 + 16KB page size support
        script: |
          # Only change targetSdkVersion (not compileSdkVersion — breaks Kotlin 1.9.23)
          printf "\nandroid.targetSdkVersion=35\n" >> mobile/android/gradle.properties
          # Enable 16KB memory page size support (required by Google Play)
          printf "\nandroid.enableSupportFor16KBPageSizes=true\n" >> mobile/android/gradle.properties
          # Additional 16KB page alignment support
          printf "\nandroid.experimental.cacheCompileLib=false\n" >> mobile/android/gradle.properties
          echo "=== Verification ==="
          grep "targetSdkVersion\|16KB\|PageSize" mobile/android/gradle.properties

      - name: Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}

  # ══════════════════════════════════════════════
  # iOS — App Store
  # ══════════════════════════════════════════════
  ios-production:
    name: "🍎 iOS — App Store"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: 16.3
      groups:
        - apple
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faahm.app

    scripts:
      - name: Install dependencies
        script: cd mobile && npm install

      - name: Prebuild iOS
        script: cd mobile && npx expo prebuild --platform ios --clean

      - name: Build iOS IPA
        script: |
          cd mobile/ios
          # Find workspace name dynamically after prebuild
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"

          # Build archive
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$SCHEME.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=RH8HBHDA3T \
            PROVISIONING_PROFILE_SPECIFIER="faahm_appstore" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

          # Create ExportOptions.plist
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?>' > ExportOptions.plist
          printf '%s' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ExportOptions.plist
          printf '%s' '<plist version="1.0"><dict>' >> ExportOptions.plist
          printf '%s' '<key>method</key><string>app-store</string>' >> ExportOptions.plist
          printf '%s' '<key>teamID</key><string>RH8HBHDA3T</string>' >> ExportOptions.plist
          printf '%s' '<key>uploadBitcode</key><false/>' >> ExportOptions.plist
          printf '%s' '<key>compileBitcode</key><false/>' >> ExportOptions.plist
          printf '%s' '<key>uploadSymbols</key><true/>' >> ExportOptions.plist
          printf '%s' '</dict></plist>' >> ExportOptions.plist
          echo "ExportOptions.plist created"

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$SCHEME.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath .

    artifacts:
      - mobile/ios/**/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}
