workflows:

  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY

    scripts:
      - name: Install dependencies
        script: cd mobile && npm install

      - name: Prebuild Android
        script: cd mobile && npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true

  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      android_signing:
        - faahm_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        PACKAGE_NAME: com.faahm.app

    scripts:
      - name: Install dependencies
        script: cd mobile && npm install

      - name: Prebuild Android
        script: cd mobile && npx expo prebuild --platform android --clean

      - name: Fix targetSdkVersion + versionCode
        script: |
          # Fix targetSdkVersion to 35 in all gradle files
          find mobile/android -name "*.gradle" -o -name "*.gradle.kts" | while read f; do
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' "$f"
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' "$f"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 35/g' "$f"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' "$f"
            echo "Patched: $f"
          done
          # Use BUILD_NUMBER from Codemagic as versionCode (always unique)
          echo "BUILD_NUMBER = $BUILD_NUMBER"
          VC=$((BUILD_NUMBER + 100))
          echo "versionCode will be: $VC"
          find mobile/android -name "*.gradle" -o -name "*.gradle.kts" | while read f; do
            sed -i "s/versionCode [0-9]*/versionCode $VC/g" "$f"
            echo "versionCode set in: $f"
          done

      - name: Sign and Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - ebrahimkhlil01@gmail.com
        notify:
          success: true
          failure: true
