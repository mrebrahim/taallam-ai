workflows:

  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
    scripts:
      - name: Install
        script: cd mobile && npm install
      - name: Prebuild
        script: cd mobile && npx expo prebuild --platform android --clean
      - name: Build APK
        script: cd mobile/android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}

  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      android_signing:
        - faahm_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        PACKAGE_NAME: com.faahm.app
        VERSION_CODE: "12"
    scripts:
      - name: Install
        script: cd mobile && npm install

      - name: Set versionCode
        script: |
          cd mobile
          node -e "var fs=require('fs'),d=JSON.parse(fs.readFileSync('app.json'));d.expo.android.versionCode=parseInt('$VERSION_CODE');fs.writeFileSync('app.json',JSON.stringify(d,null,2));console.log('versionCode='+parseInt('$VERSION_CODE'))"

      - name: Prebuild Android
        script: cd mobile && npx expo prebuild --platform android --clean

      - name: Fix app label name to فاهم
        script: |
          # Force app_name in strings.xml to match store listing
          STRINGS_FILE="mobile/android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">فاهم<\/string>/g' "$STRINGS_FILE"
            echo "✅ App name fixed in strings.xml:"
            cat "$STRINGS_FILE"
          else
            echo "❌ strings.xml not found"
            find mobile/android -name "strings.xml" | head -5
          fi

      - name: Set targetSdkVersion 35 + 16KB page size support
        script: |
          # Only change targetSdkVersion (not compileSdkVersion — breaks Kotlin 1.9.23)
          printf "\nandroid.targetSdkVersion=35\n" >> mobile/android/gradle.properties
          # Enable 16KB memory page size support (required by Google Play)
          printf "\nandroid.enableSupportFor16KBPageSizes=true\n" >> mobile/android/gradle.properties
          # Additional 16KB page alignment support
          printf "\nandroid.experimental.cacheCompileLib=false\n" >> mobile/android/gradle.properties
          echo "=== Verification ==="
          grep "targetSdkVersion\|16KB\|PageSize" mobile/android/gradle.properties

      - name: Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}

  ios-production:
    name: "🍎 iOS — App Store"
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        BUNDLE_ID: com.faahm.app

    scripts:
      - name: Install
        script: cd mobile && npm install

      - name: Set build number
        script: |
          cd mobile
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          node -e "
            var fs=require('fs'),d=JSON.parse(fs.readFileSync('app.json'));
            if(!d.expo.ios) d.expo.ios={};
            d.expo.ios.buildNumber='$BUILD_NUMBER';
            fs.writeFileSync('app.json',JSON.stringify(d,null,2));
            console.log('✅ buildNumber=$BUILD_NUMBER');
          "

      - name: Prebuild iOS
        script: cd mobile && npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd mobile/ios && pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing files
        script: |
          mkdir -p ~/.private_keys
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            | sed 's/\\n/\n/g' \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE=$(find mobile/ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "✅ Workspace: $WORKSPACE  Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/$SCHEME.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            OTHER_CODE_SIGN_FLAGS="--keychain $CM_KEYCHAIN_PATH" \
            CODE_SIGN_STYLE=Manual
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/$SCHEME.xcarchive" \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath "$CM_BUILD_DIR/ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients: [ebrahimkhlil01@gmail.com]
        notify: {success: true, failure: true}
