workflows:

  # ══════════════════════════════════════════════
  # Android APK (للتجربة والتوزيع المباشر)
  # ══════════════════════════════════════════════
  android-apk:
    name: "📱 Android APK (Preview)"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EAS_PROJECT_ID: db7b041c-4ebd-463e-8200-0fba79f76f81

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Prebuild Android
        script: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease 2>&1

    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - ibrahim@n8nar.com
        notify:
          success: true
          failure: true

  # ══════════════════════════════════════════════
  # Android AAB — Google Play Store
  # ══════════════════════════════════════════════
  android-production:
    name: "🚀 Android AAB — Google Play"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      android_signing:
        - taallam_keystore
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        EAS_PROJECT_ID: db7b041c-4ebd-463e-8200-0fba79f76f81
        PACKAGE_NAME: com.faahm.app

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Prebuild Android
        script: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Sign & Build AAB
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - mobile/android/app/build/outputs/**/*.aab
      - mobile/android/app/build/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        in_app_update_priority: 3
      email:
        recipients:
          - ibrahim@n8nar.com
        notify:
          success: true
          failure: true

  # ══════════════════════════════════════════════
  # iOS — App Store
  # ══════════════════════════════════════════════
  ios-production:
    name: "🍎 iOS — App Store"
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faahm.app
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://raskcogecjfwuxvwldzp.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        BUNDLE_ID: com.faahm.app

    scripts:
      - name: Install dependencies
        script: |
          cd mobile && npm install

      - name: Set build number
        script: |
          cd mobile
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          node -e "
            var fs = require('fs');
            var d = JSON.parse(fs.readFileSync('app.json'));
            if (!d.expo.ios) d.expo.ios = {};
            d.expo.ios.buildNumber = '$BUILD_NUMBER';
            fs.writeFileSync('app.json', JSON.stringify(d, null, 2));
            console.log('✅ buildNumber = $BUILD_NUMBER');
          "

      - name: Prebuild iOS
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: $EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY: $EXPO_PUBLIC_SUPABASE_ANON_KEY

      - name: Install CocoaPods
        script: |
          cd mobile/ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE=$(find mobile/ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "✅ Workspace: $WORKSPACE  Scheme: $SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/$SCHEME.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            OTHER_CODE_SIGN_FLAGS="--keychain $CM_KEYCHAIN_PATH" \
            CODE_SIGN_STYLE=Manual

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/$SCHEME.xcarchive" \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath "$CM_BUILD_DIR/ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - ibrahim@n8nar.com
        notify:
          success: true
          failure: true
