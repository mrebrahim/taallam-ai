name: 🚀 Android AAB — Google Play

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version Code (must be higher than last upload)'
        required: true
        default: '13'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd mobile
          npm install

      - name: Set versionCode
        run: |
          cd mobile
          node -e "
            var fs = require('fs');
            var d = JSON.parse(fs.readFileSync('app.json'));
            d.expo.android.versionCode = parseInt('${{ github.event.inputs.version_code }}');
            fs.writeFileSync('app.json', JSON.stringify(d, null, 2));
            console.log('✅ versionCode = ' + d.expo.android.versionCode);
          "

      - name: Prebuild Android
        run: |
          cd mobile
          npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Fix app name in strings.xml
        run: |
          STRINGS_FILE="mobile/android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">فاهم<\/string>/' "$STRINGS_FILE"
            echo "✅ App name set to فاهم"
            cat "$STRINGS_FILE"
          fi

      - name: Set targetSdkVersion 35
        run: |
          printf "\nandroid.targetSdkVersion=35\n" >> mobile/android/gradle.properties
          echo "✅ targetSdkVersion=35"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/faahm-release.keystore
          echo "✅ Keystore decoded"

      - name: Build AAB
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/faahm-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: faahm-release-v${{ github.event.inputs.version_code }}.aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
